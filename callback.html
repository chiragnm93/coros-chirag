<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>COROS Authorization</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 480px; margin: 80px auto; padding: 0 24px; color: #1a1a1a; }
    .code-box { background: #f0f0f0; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; word-break: break-all; margin-top: 16px; }
    .status { color: #2d7d2d; font-weight: 600; }
    .error { color: #c0392b; }
  </style>
</head>
<body>
  <h2 id="heading">Authorizing...</h2>
  <div id="content"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    if (code) {
      document.getElementById('heading').textContent = 'Authorization successful';
      document.getElementById('content').innerHTML =
        '<p class="status">Copy your authorization code below:</p>' +
        '<div class="code-box">' + code + '</div>' +
        '<p style="font-size:0.85rem;color:#555;margin-top:16px;">Paste this into your terminal to exchange for an access token.</p>';
    } else if (error) {
      document.getElementById('heading').textContent = 'Authorization failed';
      document.getElementById('content').innerHTML =
        '<p class="error">Error: ' + error + '</p>';
    } else {
      document.getElementById('heading').textContent = 'No authorization data found';
      document.getElementById('content').innerHTML =
        '<p>Check the URL and try again.</p>';
    }
  </script>
</body>
</html>
